[theme]
base            = "dark"
primaryColor    = "#2563eb"
backgroundColor = "#0f1117"
secondaryBackgroundColor = "#1e2130"
textColor       = "#e0e0e0"
font            = "sans serif"

[server]
headless       = true
enableCORS     = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
